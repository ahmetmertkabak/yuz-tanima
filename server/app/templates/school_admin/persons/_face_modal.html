<div class="modal fade" id="faceModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Yüz Kaydet — {{ person.full_name }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-7">
            <div class="position-relative bg-dark rounded overflow-hidden" style="aspect-ratio: 4/3;">
              <video id="face-video" autoplay playsinline
                     class="w-100 h-100" style="object-fit: cover;"></video>
              <div id="face-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center">
                <span class="text-white opacity-75 small">Kamera yükleniyor...</span>
              </div>
            </div>
            <div class="text-center mt-2">
              <button type="button" class="btn btn-primary" id="capture-btn" disabled>
                <i class="bi bi-camera-fill"></i> Fotoğraf Çek (0/5)
              </button>
              <button type="button" class="btn btn-outline-secondary" id="reset-btn">
                <i class="bi bi-arrow-counterclockwise"></i> Sıfırla
              </button>
            </div>
          </div>

          <div class="col-md-5">
            <h6 class="small text-uppercase text-muted mb-2">Yakalanan Fotoğraflar</h6>
            <div id="thumbnails" class="d-flex flex-wrap gap-2"></div>
            <div class="small text-muted mt-3">
              <p class="mb-1"><i class="bi bi-info-circle"></i> Önerilen:</p>
              <ul class="mb-0 ps-3">
                <li>Yüzünüz kadraja sığmalı</li>
                <li>Gözlük takmadan 1 kare de çekin</li>
                <li>Hafif sağa / sola bakarak çeşitlilik ekleyin</li>
                <li>İyi aydınlatma</li>
              </ul>
            </div>

            <div id="status-alert" class="alert alert-info small mt-3 d-none"></div>
          </div>
        </div>
        <canvas id="face-canvas" style="display:none"></canvas>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">İptal</button>
        <button type="button" class="btn btn-success" id="submit-frames-btn" disabled>
          <i class="bi bi-check-lg"></i> Kaydet
        </button>
      </div>
    </div>
  </div>
</div>
