<!doctype html>
<html lang="tr" data-bs-theme="{% block bs_theme %}light{% endblock %}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Yüz Tanıma{% endblock %} · {{ config.APP_NAME }}</title>

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">

  <!-- Tabler 1.4 (Bootstrap 5 tabanlı) -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler-flags.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler-socials.min.css" rel="stylesheet">

  <style>
    @import url('https://rsms.me/inter/inter.css');
    :root { --tblr-font-sans-serif: 'Inter Var', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { font-feature-settings: "cv02","cv03","cv04","cv11"; }
  </style>

  <link href="{{ url_for('static', filename='css/shared.css') }}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="page">
    {% block layout %}
      {% block content %}{% endblock %}
    {% endblock %}
  </div>

  <!-- Tabler JS (Bootstrap 5 bundle dahil) -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
